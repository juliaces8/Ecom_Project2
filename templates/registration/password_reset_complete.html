{% extends 'shop/base.html' %}

{% block title %}Password Reset Complete | MegaStore{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 text-center">
        <div class="card shadow border-0 rounded-4 p-5">
            <i class="bi bi-check-circle-fill text-success display-1 mb-4"></i>
            <h2 class="fw-bold">All Set!</h2>
            <p class="text-muted">Your password has been successfully reset. You can now use your new password to log in to your account.</p>
            
            <div class="mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm fw-bold">
                    Login Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
