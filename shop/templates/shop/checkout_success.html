{% extends 'shop/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 text-center">
        <div class="card shadow border-0 p-5 rounded-4">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
            </div>
            <h1 class="fw-bold">Success!</h1>
            <p class="fs-5 text-muted">Your order has been placed successfully.</p>
            <div class="alert alert-info border-0 py-3">
                <i class="bi bi-info-circle-fill"></i> Your invoice has been sent to your email address.
            </div>
            <a href="{% url 'product_list' %}" class="btn btn-primary btn-lg rounded-pill px-5 mt-3 shadow-sm">
                Continue Shopping
            </a>
        </div>
    </div>
</div>
{% endblock %}
